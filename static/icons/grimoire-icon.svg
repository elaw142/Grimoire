  <path d="M318 252h324c61 0 108 47 108 108v387H336c-27 0-48-21-48-48V282c0-17 13-30 30-30Z"
        fill="url(#pageGold)" stroke="#5c4617" stroke-width="10"/>
  <path d="M311 717h439" stroke="#876b27" stroke-width="18" stroke-linecap="round" opacity=".58"/>
  <path d="M640 252v465" stroke="#6e541d" stroke-width="10" opacity=".55"/>

  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <circle cx="512" cy="482" r="224" stroke-width="18"/>
    <path d="M512 212 782 482 512 752 242 482Z" stroke-width="14"/>
    <path d="M512 164v60M512 740v78M176 482h60M788 482h60" stroke-width="15"/>
    <path d="M352 322 672 642M672 322 352 642" stroke-width="10" opacity=".72"/>
    <circle cx="512" cy="482" r="34" fill="#c9a227" stroke="none"/>
    <circle cx="512" cy="482" r="13" fill="#fff1b8" stroke="none"/>
